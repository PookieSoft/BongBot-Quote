name: Create Release and Deploy BongBot

# Thin caller for PookieSoft/workflows reusable release. Runs tests with
# Codecov upload, version-bumps from merged PR labels, builds + pushes the
# Docker image, publishes the package to GitHub Packages, and creates a
# GitHub Release.

on:
    push:
        branches: [main]

jobs:
    release:
        uses: PookieSoft/workflows/.github/workflows/release.yml@v1
        with:
            runtime: bun
            build-docker: true
            docker-image-name: bongbot-quote
            publish-package: true
            codecov-slug: PookieSoft/BongBot-Quote
            environment: Prod
        secrets: inherit
