name: Dependabot auto-label

# Calls the centralised reusable workflow in PookieSoft/workflows.
# The reusable workflow gates on github.actor == 'dependabot[bot]' and
# enforces that only `patch` is set as the version label.

on:
    pull_request_target:
        types: [opened, reopened, labeled]

permissions:
    pull-requests: write

jobs:
    auto-label:
        uses: PookieSoft/workflows/.github/workflows/dependabot-auto-label.yml@v1
