name: PR CI & Test (Dependabot)

# Thin caller for PookieSoft/workflows reusable dependabot-pr-ci. The reusable
# strips major/minor labels (replacing the standalone dependabot-auto-label
# workflow), syncs bun.lock against the just-bumped package.json, runs tests,
# and smoke-tests a local Docker build.

on:
    pull_request_target:
        types: [opened, synchronize, reopened]
        branches: [main]

permissions:
    contents: write
    pull-requests: write
    packages: read

jobs:
    ci:
        uses: PookieSoft/workflows/.github/workflows/dependabot-pr-ci.yml@v1
        with:
            runtime: bun
            sync-bun-lock: true
            build-docker: true
            smoke-test: true
            docker-image-name: bongbot-quote-dependabot
            environment: Dev
        secrets: inherit
