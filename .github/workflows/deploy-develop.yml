name: PR CI & Test

# Thin caller for PookieSoft/workflows reusable pr-ci. Skips Dependabot PRs —
# those go through deploy-develop-dependabot.yml.

on:
    pull_request:
        types: [opened, synchronize]
        branches: [main]

# Permissions must be granted at the caller level — the reusable workflow can
# only request a subset of what's granted here.
permissions:
    checks: write
    pull-requests: write
    packages: read

jobs:
    ci:
        uses: PookieSoft/workflows/.github/workflows/pr-ci.yml@v1
        with:
            runtime: bun
            build-docker: true
            smoke-test: true
            ssh-deploy: true
            docker-image-name: bongbot-quote-develop
            service-name-prefix: bongbot-quote-develop
            coverage-comment: true
            environment: Dev
        secrets: inherit
