name: PR CI & Test

# Thin caller for PookieSoft/workflows reusable pr-ci. Skips Dependabot PRs —
# those go through deploy-develop-dependabot.yml.

on:
    pull_request:
        types: [opened, synchronize, labeled]
        branches: [main]

jobs:
    ci:
        uses: PookieSoft/workflows/.github/workflows/pr-ci.yml@f8884246f3cf8553be0920efbabedd849a32066c
        with:
            runtime: bun
            build-docker: true
            smoke-test: true
            ssh-deploy: true
            docker-image-name: bongbot-quote-develop
            service-name-prefix: bongbot-quote-develop
            coverage-comment: true
            environment: Dev
        secrets: inherit
