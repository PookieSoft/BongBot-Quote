name: Security Scan

# Thin caller for PookieSoft/workflows reusable security-scan. Trivy filesystem
# scan on every event; Docker image scan only on main.

on:
    schedule:
        - cron: '0 9 * * 1'  # Monday 9 AM UTC
    workflow_dispatch:
    push:
        branches: [main]
    pull_request:
        branches: [main]

# Permissions for Trivy SARIF upload to the Security tab.
permissions:
    contents: read
    security-events: write
    actions: read

jobs:
    scan:
        uses: PookieSoft/workflows/.github/workflows/security-scan.yml@v1
        with:
            docker-image-name: bongbot-quote
            scan-docker: true
        secrets: inherit
