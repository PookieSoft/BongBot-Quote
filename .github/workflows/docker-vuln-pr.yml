name: Docker Vulnerability PR

# Thin caller for PookieSoft/workflows reusable docker-vuln-pr. Snapshots the
# CVE baseline on push to main and opens a follow-up PR weekly if new CVEs
# appear since the baseline.

on:
    push:
        branches: [main]
    schedule:
        - cron: '0 9 * * 6'  # Saturday 9 AM UTC
    workflow_dispatch:

jobs:
    vuln-check:
        uses: PookieSoft/workflows/.github/workflows/docker-vuln-pr.yml@v1
        with:
            docker-image-name: bongbot-quote
        secrets: inherit
